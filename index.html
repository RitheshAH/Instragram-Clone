<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Instagram Clone</title>
    <!-- BS styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- css -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- BS icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<body>
    <div class="body">

        <header>
            <nav class="navbar">
                <div class="container-fluid">

                    <!-- Left icon -->
                    <a class="navbar-icon m-0" href="#">
                        <i class="bi bi-plus-lg fs-4"></i>
                    </a>

                    <!-- center -->
                    <a href="#" class="nav-link p-0">
                        <img src="assets/images/instragram.png" alt="Instagram Logo" width="120">
                    </a>

                    <!-- Right icon -->
                    <div class="navbar-icon">
                        <a class="nav-link p-0" href="#">
                            <i class="bi bi-heart"></i>
                        </a>
                    </div>

                </div>
            </nav>
        </header>

        <main>
            <!-- Story -->
            <div class="story-bar">
                <!-- STORY BAR -->
                <div class="container">
                    <div class="story-wrapper d-flex gap-3 py-2 border-bottom overflow-auto">

                        <!-- Story Item -->
                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=1" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>Your Story</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=2" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user2</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=3" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user3</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=4" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user4</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=5" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user5</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=5" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user5</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=5" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user5</small>
                        </div>

                        <div class="text-center">
                            <div class="story-circle">
                                <img src="https://i.pravatar.cc/100?img=5" class="card-img-top post-image" width="60"
                                    height="60">
                            </div>
                            <small>user5</small>
                        </div>
                    </div>
                </div>
            </div>
            <!-- end of Story -->

            <!-- posts and reels -->
            <div class="post">
                <div class="container">
                    <div class="post-wrapper d-flex flex-column gap-4">

                        <!-- Post Item -->
                        <div class="card">
                            <div class="card-header d-flex align-items-center gap-2">
                                <img src="https://i.pravatar.cc/100?img=1" class="rounded-circle" width="30"
                                    height="30">
                                <strong>User1</strong>
                                <div class="post-header">
                                    <button class="follow-btn">Follow</button>
                                    <i class="bi bi-three-dots"></i>
                                </div>


                            </div>

                            <img src="https://picsum.photos/500/300?random=1" class="card-img-top" alt="Post Image">
                            <!-- Post Actions -->
                            <div class="post-actions">

                                <div class="left-actions">
                                    <i class="bi bi-heart"></i>
                                    <i class="bi bi-chat"></i>
                                    <i class="bi bi-arrow-repeat"></i>
                                    <i class="bi bi-send"></i>
                                </div>

                                <div class="right-actions">
                                    <i class="bi bi-bookmark"></i>
                                </div>

                            </div>

                            <!-- Likes -->
                            <div class="post-likes">
                                Liked by <strong>user123</strong> and <strong>2,345 others</strong>
                            </div>

                            <!-- Caption -->
                            <div class="post-caption">
                                <strong>User1</strong>
                                Beautiful day 🌄
                            </div>

                            <div class="post-caption">

                            </div>

                            <!-- Caption -->
                            <div class="post-caption">
                                <strong>User1</strong>
                                Beautiful day 🌄
                            </div>
                            <!-- date -->
                            <div class="post-caption">
                                1 day ago
                            </div>
                        </div>
                        <!-- postend -->

                        <!-- Post Item -->
                        <div class="card">
                            <div class="card-header d-flex align-items-center gap-2">
                                <img src="https://i.pravatar.cc/100?img=2" class="rounded-circle" width="30"
                                    height="30">
                                <strong>User2</strong>
                                <div class="post-header">
                                    <button class="follow-btn">Follow</button>
                                    <i class="bi bi-three-dots"></i>

                            <img src="https://picsum.photos/500/300?random=2" class="card-img-top" alt="Post Image">

                                <div class="left-actions">

                                    <i class="bi bi-send"></i>
                                </div>

                                <div class="right-actions">

                            </div>

                            </div>

                            <!-- Caption -->
                            <div class="post-caption">
                                <strong>User1</strong>
                                Beautiful day 🌄
                            </div>

                            <div class="post-caption">
                                1 day ago

                    </div>


                </div>

                    <ul class="navbar-nav d-flex flex-row justify-content-around w-100 m-0 p-0">
